<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmanuel Rodríguez | Home</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root { --bg-gradient: linear-gradient(135deg, #1b1236 0%, #3a3a3a 100%); --card-bg: #1a1d24; --text-main: #ffffff; --text-muted: #a0aab2; --accent: #4f46e5; --border-low: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Soft page load transition */
        body { 
            background: var(--bg-gradient); 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
            animation: pageFadeIn 0.5s ease-out;
        }

        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; align-items: center; gap: 30px; padding: 25px 5%; background: #1a1a1a; z-index: 1000; }
        nav a { color: white; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: color 0.3s; }
        nav a:hover { color: var(--accent); }
        
        /* Added styling for the language toggle button */
        #lang-toggle { background: transparent; color: white; border: 1px solid white; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #lang-toggle:hover { background: white; color: black; }

        section { padding: 100px 5% 50px 5%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

        #home { background-color: #f4f5f6; color: #000000; position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .fingerprint-top { position: absolute; top: 0; left: 0; width: 350px; transform: translate(-30%, -20%); opacity: 0.8; z-index: 0; }
        .fingerprint-bottom { position: absolute; bottom: 0; right: 0; width: 450px; transform: translate(30%, 30%); opacity: 0.8; z-index: 0; }
        .hero-container { position: relative; width: 100%; max-width: 1000px; display: flex; align-items: center; z-index: 2; margin-top: 50px; }
        
        .hero-left-image { 
            width: 400px; height: 500px; object-fit: cover; box-shadow: 15px 15px 30px rgba(0,0,0,0.15); z-index: 1; 
            animation: fadeUp 0.8s ease-out forwards;
        }
        
        .hero-text-wrapper { 
            position: absolute; left: 280px; z-index: 3; 
            opacity: 0; 
            animation: fadeUp 0.8s ease-out 0.3s forwards;
        }

        .hero-name { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; margin-left: 20px; }
        .hero-box { border: 8px solid #111111; padding: 15px 50px; display: inline-block; background: transparent; }
        .hero-box h1 { font-size: 6.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; line-height: 1; }
        .hero-roles { text-align: right; margin-top: 15px; }
        .hero-roles h3 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; line-height: 1.3; letter-spacing: 1px; }

        /* =========================================
           RESPONSIVE DESIGN (Tablets & Mobile)
           ========================================= */
        @media (max-width: 1024px) {
            .hero-left-image { width: 350px; height: 450px; }
            .hero-text-wrapper { left: 200px; }
            .hero-box h1 { font-size: 5rem; }
            .hero-roles h3 { font-size: 1.3rem; }
        }

       @media (max-width: 768px) {
            /* 1. Mobile Navbar Fix */
            nav { justify-content: center; gap: 12px; padding: 15px 5%; flex-wrap: wrap; }
            nav a { font-size: 0.75rem; }
            #lang-toggle { padding: 4px 8px; font-size: 0.75rem; }
            
            /* 2. Hero Layout & Overlap Fixes */
            .hero-container { flex-direction: column; text-align: center; margin-top: 100px; } 
            .hero-left-image { width: 85%; max-width: 350px; height: 320px; }
            
            /* 3. Text Box Fixes (Makes the border thinner and text fit better) */
            .hero-text-wrapper { position: relative; left: 0; margin-top: -50px; }
            .hero-name { margin-left: 0; font-size: 1rem; margin-bottom: 5px; }
            .hero-box { border: 4px solid #111111; padding: 10px 20px; background: rgba(244, 245, 246, 0.95); }
            .hero-box h1 { font-size: 3.2rem; letter-spacing: -1px; }
            .hero-roles { text-align: center; margin-top: 15px; }
            .hero-roles h3 { font-size: 1.1rem; }
            
            /* 4. Shrink fingerprints so they don't cover text */
            .fingerprint-top { width: 150px; }
            .fingerprint-bottom { width: 200px; }
        }
        /* =========================================
           ANIMATION KEYFRAMES
           ========================================= */
        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           BILINGUAL LIGHT SWITCH CSS
           ========================================= */
        /* Default State: Hide all Spanish text */
        .lang-es { 
            display: none; 
        }

        /* Toggled State: Hide English, Show Spanish */
        body.spanish-active .lang-en { 
            display: none; 
        }
        body.spanish-active .lang-es { 
            display: block; 
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="lang-en">Home</a>
        <a href="about.html" class="lang-en">About Me</a>
        <a href="portfolio.html" class="lang-en">Portfolio</a>
        <a href="resume.pdf" target="_blank" class="lang-en">Curriculum</a> 
        
        <a href="index.html" class="lang-es">Inicio</a>
        <a href="about.html" class="lang-es">Sobre Mí</a>
        <a href="portfolio.html" class="lang-es">Portafolio</a>
        <a href="resume.pdf" target="_blank" class="lang-es">Currículum</a> 
        
        <button id="lang-toggle">ESP</button>
    </nav>

    <section id="home">
        <img src="fingerprint-top.png" alt="Decoration" class="fingerprint-top">
        <img src="fingerprint-bottom.png" alt="Decoration" class="fingerprint-bottom">
        <div class="hero-container">
            <img src="desk-setup.jpg" alt="Design Setup" class="hero-left-image">
            <div class="hero-text-wrapper">
                <p class="hero-name">EMMANUEL RODRÍGUEZ</p>
                
                <div class="lang-en">
                    <div class="hero-box"><h1>PORTFOLIO</h1></div>
                    <div class="hero-roles">
                        <h3>GRAPHIC DESIGNER</h3>
                        <h3>GAME DEVELOPER</h3>
                        <h3>FRONT-END DEVELOPER</h3>
                    </div>
                </div>

                <div class="lang-es">
                    <div class="hero-box"><h1>PORTAFOLIO</h1></div>
                    <div class="hero-roles">
                        <h3>DISEÑADOR GRÁFICO</h3>
                        <h3>DESARROLLADOR DE VIDEOJUEGOS</h3>
                        <h3>DESARROLLADOR FRONT-END</h3>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script>
        // --- LANGUAGE TOGGLE LOGIC WITH LOCAL STORAGE ---
        const langToggleBtn = document.getElementById("lang-toggle");

        // 1. When the page loads, check if the user already chose Spanish
        if (localStorage.getItem("portfolioLang") === "spanish") {
            document.body.classList.add("spanish-active");
            langToggleBtn.textContent = "ENG";
        }

        // 2. What happens when they click the button
        langToggleBtn.addEventListener("click", function() {
            document.body.classList.toggle("spanish-active");

            if (document.body.classList.contains("spanish-active")) {
                langToggleBtn.textContent = "ENG";
                localStorage.setItem("portfolioLang", "spanish"); // Save choice to browser memory
            } else {
                langToggleBtn.textContent = "ESP";
                localStorage.setItem("portfolioLang", "english"); // Save choice to browser memory
            }
        });
    </script>
</body>
</html>
